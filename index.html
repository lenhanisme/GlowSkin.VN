<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlowSkin.VN - Skincare Routine Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A94FF; /* Màu xanh Tiki */
            --primary-hover: #0b7ae0;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f111a;
            --surface: #1e2130;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .bg-glow-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(26,148,255,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
        .bg-glow-2 { position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }

        /* Header */
        .site-header { background: rgba(30, 33, 48, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .logo-link { text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-link h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .site-footer { margin-top: auto; padding: 20px; text-align: center; border-top: 1px solid var(--border); background: rgba(30, 33, 48, 0.4); color: var(--text-muted); font-size: 0.8rem; }

        /* Container */
        .app-container { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 24px; align-items: flex-start; width: 100%; flex: 1; }
        
        /* Sidebar */
        .sidebar { flex: 0 0 320px; background: rgba(30, 33, 48, 0.6); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: sticky; top: 80px; }
        .profile-section { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; margin-bottom: 20px; }
        .profile-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: block; }
        .selector-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .selector-group:last-child { margin-bottom: 0; }
        .selector-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 5px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.8rem; text-align: center; }
        .selector-btn.active { background: rgba(26, 148, 255, 0.2); border-color: var(--primary); color: white; }

        .stat-box { background: var(--surface); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }
        .stat-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; display: block; }
        .stat-value { font-size: 1.3rem; font-weight: 800; }
        .water-controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn-water { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-water:hover { background: var(--primary); border-color: var(--primary); }
        .progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: 0.5s ease; }

        /* Main Content */
        .main-content { flex: 1; min-width: 0; }
        
        /* Tabs Scrollable (Mobile Friendly) */
        .tabs-container { margin-bottom: 20px; position: relative; }
        .tabs-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tabs-scroll::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 100px; font-size: 0.9rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(26, 148, 255, 0.3); }

        /* Tasks */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item { background: rgba(30, 33, 48, 0.5); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; align-items: flex-start; gap: 12px; transition: 0.3s; }
        .task-item.checked { border-color: var(--success); background: rgba(16, 185, 129, 0.05); opacity: 0.7; }
        .checkbox { width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
        .task-item.checked .checkbox { background: var(--success); border-color: var(--success); }
        .task-item.checked .checkbox::after { content: '✓'; color: white; font-weight: bold; font-size: 14px; }
        .task-content { flex: 1; }
        .task-title { font-size: 1rem; font-weight: 600; color: var(--text-main); margin-bottom: 4px; display: block; }
        .task-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
        .task-item.checked .task-title { text-decoration: line-through; }

        /* Search & Shopping */
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; outline: none; width: 100%;}
        .search-input:focus { border-color: var(--primary); }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;}
        
        .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;}
        .tag-suggest { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; cursor: pointer; }
        .tag-suggest:hover { background: rgba(26, 148, 255, 0.2); color: white; border-color: var(--primary); }

        /* Product Grid cho Mobile & Desktop */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: white; padding: 5px; }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .product-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; flex: 1; }
        .product-price { color: var(--warning); font-weight: 800; font-size: 1.1rem; }
        .btn-buy { text-align: center; background: rgba(26, 148, 255, 0.1); border: 1px solid var(--primary); color: var(--primary); text-decoration: none; padding: 8px; border-radius: 8px; margin-top: 10px; font-weight: 600; font-size: 0.85rem; }

        /* Responsive Mobile Tối Ưu */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; padding: 15px; gap: 20px; }
            .sidebar { width: 100%; position: static; padding: 15px; border-radius: 16px; }
            
            /* Sửa khung search trên mobile: input và button rớt dòng cho dễ bấm */
            .search-container { flex-direction: column; }
            .btn-search { padding: 12px; }
            
            /* Lưới sản phẩm: 2 món trên 1 hàng cho mobile (Giống app Shopee) */
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-img { height: 140px; }
            .product-info { padding: 10px; }
            .product-name { font-size: 0.8rem; }
            .product-price { font-size: 1rem; }
            .btn-buy { font-size: 0.8rem; padding: 6px; }
        }

        /* Responsive Mobile Rất Nhỏ (iPhone SE, Galaxy Fold) */
        @media (max-width: 360px) {
            .product-grid { grid-template-columns: 1fr; }
            .product-img { height: 180px; }
        }
    </style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<header class="site-header">
    <a href="index.html" class="logo-link">
        <h1>GlowSkin<span>.VN</span></h1>
    </a>
    <div style="font-size: 0.8rem; color: var(--text-muted); background: rgba(26,148,255,0.1); padding: 4px 10px; border-radius: 50px; border: 1px solid rgba(26,148,255,0.3); color: var(--primary); font-weight: 600;">Y Khoa</div>
</header>

<div class="app-container">
    <aside class="sidebar">
        <div class="profile-section">
            <span class="profile-title">⚙️ Cài đặt hồ sơ da</span>
            <div class="selector-group">
                <button class="selector-btn" id="btn-male" onclick="setProfile('gender', 'male')">👨 Nam giới</button>
                <button class="selector-btn" id="btn-female" onclick="setProfile('gender', 'female')">👩 Nữ giới</button>
            </div>
            <div class="selector-group">
                <button class="selector-btn" id="btn-oily" onclick="setProfile('skin', 'oily')">💧 Da Dầu/Mụn</button>
                <button class="selector-btn" id="btn-dry" onclick="setProfile('skin', 'dry')">🍂 Da Khô/Yếu</button>
            </div>
        </div>

        <div class="stat-box">
            <span class="stat-title">Nước uống hôm nay</span>
            <span class="stat-value" id="water-count">0.0 / 2.0L</span>
            <div class="water-controls">
                <button class="btn-water" onclick="updateWater(-250)">- 250ml</button>
                <button class="btn-water" onclick="updateWater(250)">+ 250ml</button>
            </div>
        </div>
        <div class="stat-box">
            <span class="stat-title">Tiến độ Routine</span>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <span class="stat-value" id="p-txt">0%</span>
                <span style="color: var(--text-muted); font-size: 0.8rem;" id="task-count">0/0 Task</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="tabs-container">
            <div class="tabs-scroll">
                <button class="tab-btn active" onclick="switchTab(event, 'morning')">🌅 Sáng</button>
                <button class="tab-btn" onclick="switchTab(event, 'evening')">🌙 Tối</button>
                <button class="tab-btn" onclick="switchTab(event, 'lifestyle')">🧘‍♀️ Sinh hoạt</button>
                <button class="tab-btn" onclick="switchTab(event, 'shopping')">🛒 Tìm Mỹ Phẩm Tiki</button>
            </div>
        </div>
        <div id="main-content-area"></div>
    </main>
</div>

<footer class="site-footer">
    &copy; 2026 GlowSkin.VN - Hệ thống tối ưu hóa nhan sắc. <br>
    Copyright by <span>@vnsoftware</span>. All rights reserved.
</footer>

<script>
    // DATABASE CHĂM SÓC DA
    const fullDB = [
        { id: 1, tab: 'morning', t: "Uống 1 ly nước ấm ngay khi dậy", d: "Thải độc cơ thể, đánh thức dạ dày.", gender: 'all', skin: 'all' },
        { id: 2, tab: 'morning', t: "Rửa mặt nước lạnh / ấm nhẹ", d: "Da khô chỉ nên rửa bằng nước, không dùng SRM sáng để tránh mất màng ẩm.", gender: 'all', skin: 'dry' },
        { id: 3, tab: 'morning', t: "Dùng Sữa rửa mặt tạo bọt", d: "Làm sạch dầu nhờn tiết ra sau một đêm ngủ.", gender: 'all', skin: 'oily' },
        { id: 4, tab: 'morning', t: "Cạo râu & Dùng Toner làm dịu", d: "Sử dụng bọt cạo râu, lau toner sát khuẩn sau cạo.", gender: 'male', skin: 'all' },
        { id: 5, tab: 'morning', t: "Lau Toner kẹp ẩm (HA / Panthenol)", d: "Giúp da căng mọng trước khi makeup hoặc bôi kem chống nắng.", gender: 'female', skin: 'dry' },
        { id: 6, tab: 'morning', t: "Thoa Serum Vitamin C", d: "Chống oxy hóa, bảo vệ da khỏi gốc tự do.", gender: 'all', skin: 'all' },
        { id: 7, tab: 'morning', t: "Kem dưỡng ẩm mỏng nhẹ (Gel)", d: "Thấm nhanh, không gây bít tắc lỗ chân lông.", gender: 'all', skin: 'oily' },
        { id: 8, tab: 'morning', t: "Kem dưỡng ẩm (Dạng Cream)", d: "Phục hồi hàng rào bảo vệ, giữ nước cho da.", gender: 'all', skin: 'dry' },
        { id: 9, tab: 'morning', t: "Bôi Kem Chống Nắng (SPF 50+)", d: "Bắt buộc. Bôi đủ 2 đốt ngón tay.", gender: 'all', skin: 'all' },
        
        { id: 20, tab: 'evening', t: "Tẩy trang bằng Nước/Dầu", d: "Lau sạch bụi bẩn, lớp makeup và kem chống nắng.", gender: 'all', skin: 'all' },
        { id: 21, tab: 'evening', t: "Vệ sinh cọ / mút trang điểm", d: "Giặt sạch bằng nước giặt để tránh vi khuẩn ủ mụn.", gender: 'female', skin: 'all' },
        { id: 22, tab: 'evening', t: "Sữa rửa mặt Sạch Sâu", d: "Massage kỹ vùng chữ T (trán, mũi, cằm).", gender: 'all', skin: 'oily' },
        { id: 23, tab: 'evening', t: "Sữa rửa mặt Dịu Nhẹ (Không bọt)", d: "Bảo vệ màng lipid tự nhiên của da khô.", gender: 'all', skin: 'dry' },
        { id: 24, tab: 'evening', t: "Tẩy da chết hóa học BHA", d: "Dùng 2-3 lần/tuần. Đẩy mụn ẩn, mụn đầu đen.", gender: 'all', skin: 'oily' },
        { id: 25, tab: 'evening', t: "Tẩy da chết hóa học AHA", d: "Dùng 1-2 lần/tuần. Giúp da khô sần sùi trở nên láng mịn.", gender: 'all', skin: 'dry' },
        { id: 26, tab: 'evening', t: "Thoa Toner cân bằng pH", d: "Trả lại môi trường pH 5.5 cho da.", gender: 'all', skin: 'all' },
        { id: 27, tab: 'evening', t: "Thoa Serum Đặc trị", d: "Kiềm dầu, se khít lỗ chân lông, làm sáng da.", gender: 'all', skin: 'all' },
        { id: 28, tab: 'evening', t: "Dưỡng ẩm khóa tinh chất", d: "Khóa chặt tinh chất lại dưới da không bị bay hơi.", gender: 'all', skin: 'all' },

        { id: 50, tab: 'lifestyle', t: "Uống đủ 2 Lít nước lọc", d: "Da thiếu nước sẽ tiết thêm dầu để bù lại.", gender: 'all', skin: 'all' },
        { id: 51, tab: 'lifestyle', t: "Tuyệt đối không sờ tay lên mặt", d: "Nguyên nhân số 1 gây mụn viêm lây lan.", gender: 'all', skin: 'all' },
        { id: 52, tab: 'lifestyle', t: "Thay và giặt vỏ gối (1 lần/tuần)", d: "Tránh vi khuẩn từ tóc lây lên mặt khi ngủ.", gender: 'all', skin: 'all' },
        { id: 53, tab: 'lifestyle', t: "Cắt giảm Đồ ngọt / Sữa bò", d: "Đường kích thích tuyến bã nhờn bùng viêm mụn ẩn cực mạnh.", gender: 'all', skin: 'all' },
        { id: 54, tab: 'lifestyle', t: "Ngủ trước 23h30", d: "Thức khuya da sẽ sạm và rũ rượi vào hôm sau.", gender: 'all', skin: 'all' },
        { id: 55, tab: 'lifestyle', t: "Theo dõi chu kỳ kinh nguyệt", d: "Mụn nội tiết thường mọc quanh cằm trước kỳ rụng trứng.", gender: 'female', skin: 'all' }
    ];

    let userProfile = {
        gender: localStorage.getItem('gs_gender') || 'female',
        skin: localStorage.getItem('gs_skin') || 'oily'
    };

    let currentTab = 'morning';
    let state = { checkedIds: [], waterMl: 0 };

    function initProfileUI() {
        document.getElementById('btn-male').classList.toggle('active', userProfile.gender === 'male');
        document.getElementById('btn-female').classList.toggle('active', userProfile.gender === 'female');
        document.getElementById('btn-oily').classList.toggle('active', userProfile.skin === 'oily');
        document.getElementById('btn-dry').classList.toggle('active', userProfile.skin === 'dry');
    }

    function setProfile(type, val) {
        userProfile[type] = val;
        localStorage.setItem('gs_' + type, val);
        initProfileUI();
        state.checkedIds = []; 
        render();
    }

    function getFilteredTasks(tabName) {
        return fullDB.filter(task => {
            if (task.tab !== tabName) return false;
            const matchGender = (task.gender === 'all' || task.gender === userProfile.gender);
            const matchSkin = (task.skin === 'all' || task.skin === userProfile.skin);
            return matchGender && matchSkin;
        });
    }

    function render() {
        const container = document.getElementById('main-content-area');
        
        if(currentTab === 'shopping') {
            container.innerHTML = `
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Tìm tên mỹ phẩm (VD: bha, kem chống nắng)..." onkeypress="handleEnter(event)">
                    <button class="btn-search" onclick="executeSearch()">Tìm trên Tiki</button>
                </div>
                <div class="suggestions">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">🔥 Từ khóa:</span>
                    <button class="tag-suggest" onclick="quickSearch('Serum B5 La Roche Posay')">Serum B5</button>
                    <button class="tag-suggest" onclick="quickSearch('BHA Paula Choice')">BHA Trị mụn</button>
                    <button class="tag-suggest" onclick="quickSearch('Kem chống nắng Skin Aqua')">KCN Skin Aqua</button>
                </div>
                <div id="shopping-results" class="product-grid">
                    <div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 30px;">
                        Kết nối với API <b>Tiki Trading</b> chính hãng. Nhập tên sản phẩm để bắt đầu!
                    </div>
                </div>
            `;
            return;
        }

        const activeTasks = getFilteredTasks(currentTab);
        if (activeTasks.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted)">Không có nhiệm vụ nào trong mục này.</div>`;
        } else {
            container.innerHTML = `<div class="task-list">` + activeTasks.map(item => `
                <div class="task-item ${state.checkedIds.includes(item.id) ? 'checked' : ''}" onclick="toggle(${item.id})">
                    <div class="checkbox"></div>
                    <div class="task-content">
                        <span class="task-title">${item.t}</span>
                        <span class="task-desc">${item.d}</span>
                    </div>
                </div>
            `).join('') + `</div>`;
        }
        updateStats();
    }

    function switchTab(event, tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function toggle(id) {
        if (state.checkedIds.includes(id)) state.checkedIds = state.checkedIds.filter(x => x !== id);
        else state.checkedIds.push(id);
        render();
    }

    // TIKI API SEARCH
    function handleEnter(e) { if (e.key === 'Enter') executeSearch(); }

    function quickSearch(keyword) {
        document.getElementById('search-input').value = keyword;
        executeSearch();
    }

    function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        const resultsDiv = document.getElementById('shopping-results');
        resultsDiv.innerHTML = `<div style="color: var(--primary); font-weight: bold; text-align: center; grid-column: 1/-1; padding: 40px;">🔄 Đang lấy dữ liệu từ Tiki...</div>`;

        fetch('/api/scraper?q=' + encodeURIComponent(query))
            .then(res => res.json())
            .then(response => {
                if(response.error) {
                    resultsDiv.innerHTML = `<div style="color:var(--danger); text-align:center; grid-column:1/-1; padding: 20px;">${response.error}</div>`;
                    return;
                }
                
                const data = response.data;
                if(!data || data.length === 0) {
                    resultsDiv.innerHTML = `<div style="color: var(--text-muted); text-align:center; grid-column:1/-1;">Không tìm thấy sản phẩm chính hãng nào.</div>`;
                    return;
                }

                resultsDiv.innerHTML = data.map(p => `
                    <div class="product-card">
                        <img src="${p.image}" class="product-img" alt="img">
                        <div class="product-info">
                            <div class="product-name">${p.title}</div>
                            <div class="product-price">${p.price}</div>
                            <a href="${p.link}" target="_blank" class="btn-buy">🛒 Mua tại Tiki</a>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                resultsDiv.innerHTML = `<div style="color:var(--danger); text-align:center; grid-column:1/-1; padding: 20px;">Lỗi mạng hoặc Server Vercel chưa sẵn sàng.</div>`;
            });
    }

    function updateWater(ml) {
        state.waterMl = Math.max(0, state.waterMl + ml);
        updateStats();
    }

    function updateStats() {
        let total = getFilteredTasks('morning').length + getFilteredTasks('evening').length + getFilteredTasks('lifestyle').length;
        let done = state.checkedIds.length;
        let p = total > 0 ? Math.round((done / total) * 100) : 0;
        
        document.getElementById('p-fill').style.width = p + '%';
        document.getElementById('p-txt').innerText = p + '%';
        document.getElementById('task-count').innerText = `${done}/${total} Task`;
        document.getElementById('water-count').innerText = `${(state.waterMl/1000).toFixed(1)} / 2.0L`;
    }

    initProfileUI();
    render();
</script>
</body>
</html>
